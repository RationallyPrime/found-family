default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.9
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.19
    hooks:
      - id: uv-lock
        args:
          - --check

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run --frozen ty check
        language: system
        pass_filenames: false

      - id: shell-syntax
        name: shell syntax
        entry: bash -n run.sh run-prod.sh setup.sh scripts/infrastructure/setup-cloudflare-tunnel.sh scripts/infrastructure/smoke-production-compose.sh scripts/infrastructure/scan-source.sh
        language: system
        pass_filenames: false

      - id: compose-config
        name: Docker Compose configuration
        entry: >-
          bash -c 'export NEO4J_PASSWORD=compose-validation-password
          JWT_SECRET_KEY=compose-validation-jwt-secret-000000000000
          VOYAGE_API_KEY=compose-validation-voyage-key OAUTH_OWNER_USERNAME=owner
          OAUTH_OWNER_PASSWORD=compose-validation-owner-password
          PUBLIC_BASE_URL=https://memory.example.com;
          docker compose --env-file .env.example config --quiet &&
          docker compose --env-file .env.example -f docker-compose.prod.yml config --quiet &&
          docker compose --env-file .env.example -f docker-compose.prod.yml
          -f docker-compose.smoke.yml config --quiet'
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest (non-integration)
        entry: >-
          env OMP_NUM_THREADS=1 OPENBLAS_NUM_THREADS=1 MKL_NUM_THREADS=1
          NUMEXPR_NUM_THREADS=1 uv run --frozen pytest -m not\ integration
        language: system
        pass_filenames: false
        stages:
          - pre-push
